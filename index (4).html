<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copilot - Your AI Assistant</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo">
        <i class="fas fa-robot"></i>
        <span>Copilot</span>
      </div>
      <button class="new-chat" onclick="newChat()">
        <i class="fas fa-plus"></i> New Chat
      </button>
      
      <div class="history">
        <h3>Recent</h3>
        <div id="chat-history"></div>
      </div>
    </div>

    <!-- Main Chat Area -->
    <div class="chat-area">
      <div class="header">
        <h2>Microsoft Copilot</h2>
        <div class="user-info">
          <i class="fas fa-user-circle"></i>
        </div>
      </div>

      <div id="chat-messages" class="messages">
        <!-- Messages will be added by JS -->
      </div>

      <div class="input-area">
        <div class="suggestions" id="suggestions">
          <!-- Dynamic suggestions -->
        </div>
        <div class="input-box">
          <input type="text" id="user-input" placeholder="Ask me anything..." autocomplete="off">
          <button onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
        <p class="footer-text">Copilot can make mistakes. Consider checking important info.</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
